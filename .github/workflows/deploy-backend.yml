name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'shared/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  PROJECT_ID: ws-seeker
  REGION: us-central1
  SERVICE_NAME: ws-seeker-backend
  REPO_NAME: ws-seeker-backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_WS_SEEKER }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      # Note: We need to create the Artifact Registry repository first if it doesn't exist.
      # Since we don't have permissions to do it via gcloud in the job easily without failures,
      # we assume it exists or use GCR (gcr.io) which is deprecated but easier.
      # Let's try Artifact Registry but fallback to checking if we can create it.
      
      - name: Build and Push Container
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }} -f backend/Dockerfile .
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          region: ${{ env.REGION }}
          env_vars: |
            SHOPIFY_SHOP_DOMAIN=${{ secrets.SHOPIFY_SHOP_DOMAIN }}
            SHOPIFY_ADMIN_TOKEN=${{ secrets.SHOPIFY_ADMIN_TOKEN }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            FROM_EMAIL=${{ secrets.FROM_EMAIL }}
            BASE_URL=${{ secrets.BASE_URL }}

      - name: Set Firebase service account env var
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          python3 << 'PYEOF'
          import os
          sa_json = os.environ['FIREBASE_SA_JSON']
          escaped = sa_json.replace("'", "''")
          with open('/tmp/update-env.yaml', 'w') as f:
              f.write(f"FIREBASE_SERVICE_ACCOUNT_JSON: '{escaped}'\n")
          PYEOF
          gcloud run services update ws-seeker-backend \
            --region us-central1 \
            --project ws-seeker \
            --update-env-vars-file=/tmp/update-env.yaml
